<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Designer Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <span class="logo">Nome Cognome</span>
            <div class="nav-links">
                <a href="#projects">Progetti</a>
                <a href="#about">Info</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h1 class="hero-title" data-speed="-2">VISUAL<br>DESIGN</h1>
            <div class="hero-shape" data-speed="4"></div>
            <p class="hero-subtitle" data-speed="1">Portfolio 2026 — Selezionato con cura.</p>
        </section>

        <section id="projects" class="projects-section">
            <h2 class="section-title">Lavori</h2>
            <div class="grid">
                
                <div class="project-card" data-tilt>
                    <div class="card-inner">
                        <div class="card-image" style="background-image: url('https://picsum.photos/600/800?random=1');"></div>
                        <div class="card-info">
                            <h3>Brand Identity</h3>
                            <p>Studio d'immagine coordinata</p>
                        </div>
                    </div>
                </div>

                <div class="project-card" data-tilt>
                    <div class="card-inner">
                        <div class="card-image" style="background-image: url('https://picsum.photos/600/800?random=2');"></div>
                        <div class="card-info">
                            <h3>Editorial Design</h3>
                            <p>Progetto editoriale e tipografico</p>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
